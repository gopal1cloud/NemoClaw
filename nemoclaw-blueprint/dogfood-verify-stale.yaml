#
# Dogfood blueprint — verify-stale autonomous run.
#
# This blueprint stands up a long-lived maintainer sandbox that runs the
# `nemoclaw-maintainer-verify-stale` skill in batch mode, processing up to
# `VERIFY_STALE_BATCH_CAP` candidate issues sequentially. Each candidate
# provisions one short-lived Brev verification sandbox (per Step 7 of the
# skill); baseline and latest installs happen on the same box back-to-back,
# the box is torn down on candidate exit (via the skill's trap).
#
# The blueprint is NOT a replacement for `blueprint.yaml` — that one is the
# canonical user-facing blueprint. This file is invoked explicitly:
#
#     nemoclaw onboard --blueprint nemoclaw-blueprint/dogfood-verify-stale.yaml
#
# After onboarding completes the operator runs the orchestrator script:
#
#     bash /workspace/scripts/dogfood-orchestrator.sh
#
# (Once the proposed `skills:` + `entrypoint:` schema additions land — see
# the architecture thread linked in the PR description — the orchestrator
# becomes a blueprint-level concern and this two-step pattern goes away.)
#
# Operational handoff:
#   1. Edit the env vars under `components.sandbox.env` below to match your
#      run (batch cap, dry-run on/off, log dir, budget).
#   2. Mount three secrets via your usual secret-injection path:
#      - BREV_API_TOKEN  (Brev account API token, create+delete perms)
#      - GH_TOKEN        (gh CLI; repo scope for label + comment writes)
#      - NVIDIA_API_KEY  (file at ~/.nvidia-api-key, mode 0600) — only if
#                         you plan to process non-Ollama BUG_PROVIDER bugs;
#                         the dogfood v1 candidate filter forces ollama-only
#                         so this is optional for the first pass.
#   3. Run `nemoclaw onboard --blueprint ...` and walk away. The orchestrator
#      script logs everything to $VERIFY_STALE_LOG_DIR and posts a wrap-up
#      Gist at end-of-run; you read the wrap-up whenever.

version: "0.1.0"
min_openshell_version: "0.0.44"
max_openshell_version: "0.0.44"
min_openclaw_version: "2026.5.18"
digest: "sha256:b3d832b596ab6b7184a9dcb4ae93337ca32851a4f93b00765cc12de26baa3a9a"

profiles:
  - default

description: |
  Long-lived maintainer sandbox that runs the verify-stale skill across
  up to N candidate issues sequentially, provisioning per-candidate Brev
  verification sandboxes. End-of-run wrap-up posts results to a Gist.

components:
  sandbox:
    image: "ghcr.io/nvidia/openshell-community/sandboxes/openclaw@sha256:b3d832b596ab6b7184a9dcb4ae93337ca32851a4f93b00765cc12de26baa3a9a"
    name: "openclaw"
    forward_ports:
      - 18789
    # 75% gives the orchestrator headroom for the parallel `gh` API calls
    # the skill makes during candidate-filtering (Step 3 fetches comments
    # per-candidate) without starving the host.
    resource_profiles:
      developer:
        cpu: "75%"
        memory: "75%"

    # Long-lived: the maintainer sandbox persists across the whole batch
    # so transcripts, metadata, and the activity log live in one place.
    # Individual Brev verification sandboxes are short-lived (one per
    # candidate, torn down by the skill's trap on exit).
    lifecycle: long_lived

    # Persistent volume so the run's logs survive a sandbox restart.
    # The orchestrator's end-of-run Gist dump runs from this volume.
    volumes:
      - name: verify-stale-logs
        mount_path: /workspace/verify-stale-runs
        persistent: true

    # Environment knobs for the verify-stale skill. See
    # .agents/skills/nemoclaw-maintainer-verify-stale/SKILL.md for the
    # full table; the four below are the dogfood-specific switches.
    env:
      # Drives the Step 3 self-check verdict directly; skips the maintainer
      # approval prompt. The self-check itself ALWAYS runs — see
      # reference/self-check.md. PROCEED-WITH-CAVEATS folds caveats into
      # the Step 9 score cap.
      VERIFY_STALE_AUTO_APPROVE: "1"

      # Phase 4a default: compute verdicts and write comment drafts to the
      # log dir, but do NOT post comments or apply labels. Flip to "0" for
      # the live pass (phase 4b) after a human reviews the drafts.
      VERIFY_STALE_DRY_RUN: "1"

      # 10 candidates per dogfood run (vs the skill default of 15).
      VERIFY_STALE_BATCH_CAP: "10"

      # Persistent log root. Each candidate gets <root>/<issue-number>/
      # with metadata.json, transcripts, self-check.json, score.json,
      # and comment-draft.md. Top-level <root>/activity.md is the
      # append-only chronological log; <root>/run-summary.json is the
      # end-of-run aggregate the wrap-up Gist mirrors.
      VERIFY_STALE_LOG_DIR: "/workspace/verify-stale-runs"

      # Hard ceiling on cumulative Brev spend across the batch.
      # Self-check #7 evaluates against this; orchestrator halts the
      # batch if hit. Set conservatively for a v1 dogfood.
      BREV_BUDGET_USD: "200"

      # The skill's Step 6 prompts interactively if BUG_PROVIDER is
      # non-ollama and no API key is mounted. The candidate-filter step
      # in the orchestrator forces BUG_PROVIDER=ollama at filter time
      # so the prompt never fires in this run; if you want a broader
      # provider mix, mount NVIDIA_API_KEY and unset this var.
      VERIFY_STALE_FORCE_OLLAMA_ONLY: "1"

      # Non-interactive harness flag the skill (and onboard) respects.
      # Suppresses all stdin prompts; required for unattended runs.
      NEMOCLAW_NON_INTERACTIVE: "1"

  inference:
    profiles:
      default:
        # Local Ollama on the host gateway — the maintainer sandbox runs
        # the agent itself (the skill's reasoning over plans, verdicts,
        # comment drafts), so it needs an inference endpoint. Using local
        # Ollama keeps the dogfood self-contained: no NVIDIA_API_KEY needed
        # for the agent itself, and no per-token spend that competes with
        # the BREV_BUDGET_USD ceiling.
        provider_type: "openai"
        provider_name: "ollama-local"
        endpoint: "http://host.openshell.internal:11434/v1"
        # Pre-pull this model on the host before invoking the blueprint.
        model: "nemotron-3-nano:4b"
        credential_env: "OPENAI_API_KEY"
        credential_default: "dummy"
        timeout_secs: 180

  policy:
    base: "sandboxes/openclaw/policy.yaml"
    # The verify-stale skill needs three additional egress sets on top
    # of the base policy:
    #   - github     — gh API + git clone/fetch (skill posts comments,
    #                  reads issue state, fetches tag list)
    #   - brev       — Brev API + SSH outbound for `brev exec`/`brev copy`
    #   - local_inference — Ollama on the host gateway (already in the
    #                       canonical blueprint's policy presets list;
    #                       included here for completeness)
    presets:
      - github
      - brev
      - local-inference

# Forward-compatible declarations — these are the proposed schema additions
# referenced in the architecture thread. When the schema lands, the operator
# step ("bash /workspace/scripts/dogfood-orchestrator.sh") disappears and the
# entrypoint runs automatically.

# skills:
#   - id: nemoclaw-maintainer-verify-stale
#     source: github://NVIDIA/NemoClaw@<merged-skill-tag>/.agents/skills/nemoclaw-maintainer-verify-stale
#
# entrypoint:
#   command: ["bash", "/workspace/scripts/dogfood-orchestrator.sh"]
#   restart_policy: never
