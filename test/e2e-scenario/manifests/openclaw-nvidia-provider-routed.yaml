apiVersion: nemoclaw.io/v1
kind: NemoClawInstance
metadata:
  name: openclaw-nvidia-provider-routed
spec:
  setup:
    install:
      source: repo-current
    runtime:
      containerEngine: docker
      containerDaemon: running
    platform:
      os: ubuntu
      executionTarget: local
  onboarding:
    agent: openclaw
    provider: routed
    modelRoute: inference-local
    policyTier: open
    messaging: []
  state:
    workspaceRef: default
    credentialRefs:
      - NVIDIA_API_KEY
