name: ci-cli-coverage-shard
description: Run one shared CLI coverage shard and upload its Vitest blob report.

inputs:
  shard:
    description: One-based shard index.
    required: true
  shard-count:
    description: Total number of CLI coverage shards.
    default: "3"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: "22"
        cache: npm

    - name: Install dependencies
      shell: bash
      run: |
        npm install --ignore-scripts
        cd nemoclaw && npm install --ignore-scripts

    - name: Build TypeScript plugin
      shell: bash
      run: cd nemoclaw && npm run build

    - name: Run CLI coverage shard
      shell: bash
      run: |
        node -e "require('node:fs').rmSync('dist', { recursive: true, force: true })"
        npm run build:cli
        npx tsx scripts/check-dist-sourcemaps.ts dist
        npx vitest run --project cli \
          --shard=${{ inputs.shard }}/${{ inputs.shard-count }} \
          --reporter=github-actions \
          --reporter=blob \
          --outputFile.blob=.vitest-reports/blob-${{ inputs.shard }}-${{ inputs.shard-count }}.json \
          --coverage \
          --coverage.reporter=json-summary \
          --coverage.reportsDirectory=coverage/cli/shard-${{ inputs.shard }} \
          --coverage.include="bin/**/*.js" \
          --coverage.include="dist/lib/**/*.js" \
          --coverage.exclude="test/**/*.js" \
          --coverage.exclude="test/**/*.ts"

    - name: Upload CLI shard blob report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: cli-blob-report-${{ inputs.shard }}
        path: .vitest-reports/blob-${{ inputs.shard }}-${{ inputs.shard-count }}.json
        if-no-files-found: error
        retention-days: 1
