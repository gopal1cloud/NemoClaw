#
# Scenario-based E2E fan-out. Runs every setup scenario from the current
# migration catalog by calling the single-scenario runner workflow.

name: E2E / Scenario Runner / All

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-scenarios-all-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e-scenarios-all:
    uses: ./.github/workflows/e2e-scenarios.yaml
    with:
      scenarios: "ubuntu-repo-cloud-openclaw,ubuntu-repo-cloud-hermes,gpu-repo-local-ollama-openclaw,macos-repo-cloud-openclaw,wsl-repo-cloud-openclaw,brev-launchable-cloud-openclaw,ubuntu-no-docker-preflight-negative"
    secrets:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
