name: E2E / Linux Onboard Trace
on:
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of onboard runs"
        required: false
        default: "1"
permissions:
  contents: read
jobs:
  linux-onboard-trace:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEMOCLAW_TRACE: "1"
      NEMOCLAW_NON_INTERACTIVE: "1"
      NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
      NEMOCLAW_RECREATE_SANDBOX: "1"
      NEMOCLAW_PROVIDER: build
      NEMOCLAW_POLICY_TIER: open
      NEMOCLAW_SANDBOX_NAME: e2e-linux-trace-${{ github.run_id }}-${{ github.run_attempt }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - name: Run Linux onboard E2E with tracing
        env:
          NEMOCLAW_TRACE_DIR: /tmp/nemoclaw-traces
        run: |
          set -euo pipefail
          mkdir -p "$NEMOCLAW_TRACE_DIR"
          bash test/e2e/test-full-e2e.sh
      - name: Upload onboard trace artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-onboard-traces-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/nemoclaw-traces/
          if-no-files-found: warn
          retention-days: 14
