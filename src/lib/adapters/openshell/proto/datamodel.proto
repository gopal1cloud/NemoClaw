syntax = "proto3";

package openshell.datamodel.v1;

// Minimal public metadata subset used by NemoClaw's OpenShell gRPC adapter.
message ObjectMeta {
  string id = 1;
  string name = 2;
  int64 created_at_ms = 3;
  map<string, string> labels = 4;
  uint64 resource_version = 5;
}
